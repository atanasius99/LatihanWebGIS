<h3 style="margin-top: 30px;">Tren Perubahan Luas Kelas Tutupan Lahan</h3>
<canvas id="lulcChart" width="600" height="300" style="margin-bottom: 50px;"></canvas>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const ctx = document.getElementById('lulcChart');

  const lulcChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['2014', '2019', '2024'], // Tahun
      datasets: [
        {
          label: 'Lahan Terbangun',
          data: [6000, 8000, 11000], // Ganti dengan data Anda
          borderColor: 'red',
          backgroundColor: 'red',
          tension: 0.3
        },
        {
          label: 'Hutan',
          data: [18000, 17000, 16000], // Ganti dengan data Anda
          borderColor: 'green',
          backgroundColor: 'green',
          tension: 0.3
        },
        {
          label: 'Sawah',
          data: [12000, 11500, 9000], // Ganti dengan data Anda
          borderColor: 'blue',
          backgroundColor: 'blue',
          tension: 0.3
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        title: {
          display: true,
          text: 'Perubahan Luas Tutupan Lahan di Kabupaten Badung (ha)',
          font: { size: 16 }
        },
        legend: {
          position: 'bottom'
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          title: { display: true, text: 'Luas (hektar)' }
        },
        x: {
          title: { display: true, text: 'Tahun' }
        }
      }
    }
  });
</script>
    <body>

        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // add class to format popup if it contains media
		function addClassToPopupIfMedia(content, popup) {
			var tempDiv = document.createElement('div');
			tempDiv.innerHTML = content;
			if (tempDiv.querySelector('td img')) {
				popup._contentNode.classList.add('media');
					// Delay to force the redraw
					setTimeout(function() {
						popup.update();
					}, 10);
			} else {
				popup._contentNode.classList.remove('media');
			}
		}
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters',
            secondaryLengthUnit: 'kilometers',
            primaryAreaUnit: 'sqmeters',
            secondaryAreaUnit: 'hectares'
        });
        measureControl.addTo(map);
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].className += ' fas fa-ruler';
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_GoogleHybrid_0');
        map.getPane('pane_GoogleHybrid_0').style.zIndex = 400;
        var layer_GoogleHybrid_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {

            opacity: 1.0,
            attribution: '<a href="https://www.google.at/permissions/geoguidelines/attr-guide.html">Map data ©2015 Google</a>',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 20

        layer_GoogleHybrid_0;
        map.addLayer(layer_GoogleHybrid_0);

                    }

            });
            var popupContent = '<table>\

                    </tr>\

                    </tr>\

                    </tr>\

                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['SHAPE_Area'] !== null ? autolinker.link(String(feature.properties['SHAPE_Area']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_KecamatanBadung_1_0() {
            return {
                pane: 'pane_KecamatanBadung_1',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(114,155,111,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_KecamatanBadung_1');
        map.getPane('pane_KecamatanBadung_1').style.zIndex = 401;
        map.getPane('pane_KecamatanBadung_1').style['mix-blend-mode'] = 'normal';
        var layer_KecamatanBadung_1 = new L.geoJson(json_KecamatanBadung_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_KecamatanBadung_1',
            layerName: 'layer_KecamatanBadung_1',
            pane: 'pane_KecamatanBadung_1',

            style: style_KecamatanBadung_1_0,

        map.addLayer(layer_KecamatanBadung_1);
        map.createPane('pane_LULC_Badung_2024_Fix_2');

        var layer_LULC_Badung_2024_Fix_2 = new L.imageOverlay(img_LULC_Badung_2024_Fix_2,
